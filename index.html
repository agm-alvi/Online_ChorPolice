<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChorPolice Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LANDING SCREEN -->
  <div id="landing-screen" class="screen active">
    <div class="scanlines"></div>
    <div class="landing-container">
      <div class="logo">
        <span class="logo-top">CHOR</span>
        <span class="logo-vs">vs</span>
        <span class="logo-bot">POLICE</span>
        <span class="logo-sub">GAME</span>
      </div>
      <p class="tagline">Pick a role. Keep it secret. Survive the round.</p>
      <div class="landing-btns">
        <button class="landing-btn create-landing-btn" id="go-create">
          <span class="lb-icon">＋</span>
          <span class="lb-label">CREATE ROOM</span>
          <span class="lb-desc">Start a new game as host</span>
        </button>
        <button class="landing-btn join-landing-btn" id="go-join">
          <span class="lb-icon">⤵</span>
          <span class="lb-label">JOIN ROOM</span>
          <span class="lb-desc">Enter with a room code</span>
        </button>
      </div>
    </div>
  </div>

  <!-- CREATE ROOM SCREEN -->
  <div id="create-screen" class="screen">
    <div class="scanlines"></div>
    <div class="setup-container">
      <button class="back-btn" id="back-from-create">← BACK</button>
      <div class="screen-title">CREATE ROOM</div>

      <div class="form-group">
        <label>NUMBER OF PLAYERS</label>
        <div class="player-count-selector">
          <button class="count-btn" data-count="4">4</button>
          <button class="count-btn active" data-count="5">5</button>
          <button class="count-btn" data-count="6">6</button>
        </div>
      </div>

      <div class="form-group">
        <label for="create-name-input">YOUR NAME</label>
        <input type="text" id="create-name-input" placeholder="Enter your name" maxlength="16" autocomplete="off" />
      </div>

      <div class="room-preview-box">
        <div class="room-preview-inner">
          <span class="rp-label">YOUR ROOM CODE</span>
          <span class="rp-code" id="room-preview-code">——</span>
        </div>
        <button class="refresh-code-btn" id="refresh-code" title="New code">⟳</button>
      </div>
      <p class="note">Share this code with other players once you're inside.</p>

      <button id="create-btn" class="primary-btn">START GAME</button>
    </div>
  </div>

  <!-- JOIN ROOM SCREEN -->
  <div id="join-screen" class="screen">
    <div class="scanlines"></div>
    <div class="setup-container">
      <button class="back-btn" id="back-from-join">← BACK</button>
      <div class="screen-title">JOIN ROOM</div>

      <div class="form-group">
        <label for="join-room-input">ROOM CODE</label>
        <input type="text" id="join-room-input" placeholder="e.g. WOLF-42" maxlength="12" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="join-name-input">YOUR NAME</label>
        <input type="text" id="join-name-input" placeholder="Enter your name" maxlength="16" autocomplete="off" />
      </div>

      <button id="join-btn" class="primary-btn">JOIN GAME</button>
      <p id="join-error" class="error-msg"></p>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="scanlines"></div>

    <header class="game-header">
      <div class="header-left">
        <div class="game-logo-small">ChorPolice</div>
        <div class="room-tag">ROOM: <span id="room-display"></span></div>
      </div>
      <div class="player-tag">YOU: <span id="player-display"></span></div>
    </header>

    <div class="status-bar">
      <div id="status-msg">Waiting for players...</div>
    </div>

    <div class="players-panel">
      <div class="panel-title">SQUAD <span id="player-count-display" class="squad-count"></span></div>
      <div id="players-list"></div>
    </div>

    <div id="boxes-container" class="boxes-container"></div>

    <div class="actions">
      <button id="shuffle-btn" class="action-btn shuffle-btn" disabled>
        <span class="btn-icon">⟳</span> READY TO SHUFFLE
      </button>
      <button id="reshuffle-btn" class="action-btn reshuffle-btn" disabled>
        <span class="btn-icon">↺</span> REQUEST RESHUFFLE
      </button>
    </div>

    <div id="shuffle-votes" class="vote-tracker"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="game.js"></script>
</body>
</html>
